name: novu_todolist_app
description: "Novu — New day. New streak. Task & Habit Tracker."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # DI
  get_it: ^8.0.3
  injectable: ^2.4.4

  # Data Modeling
  freezed_annotation: ^2.4.4
  json_annotation: ^4.8.1

  # Local DB
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Key-Value Storage
  shared_preferences: ^2.3.5

  # Error Handling
  fpdart: ^1.1.0

  # Navigation
  go_router: ^14.8.1

  # Fonts
  google_fonts: ^6.2.1

  # UI Components
  flutter_slidable: ^3.1.1
  table_calendar: ^3.1.3

  # Utilities
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation — pinned to analyzer <6 compatible versions
  build_runner: ^2.4.13
  freezed: 2.5.2
  json_serializable: 6.7.1
  riverpod_generator: 2.3.11
  injectable_generator: 2.4.2

flutter:
  uses-material-design: true
